<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MultiProxy Dashboard{% endblock %}</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --surface-color: #1a1a1a;
            --surface-hover: #2a2a2a;
            --border-color: #333333;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-color: #00ffcc;
            --error-color: #ff3366;
            --success-color: #33ff66;
            --font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        h1, h2, h3 {
            margin: 0;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2rem;
        }

        .card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 0.25rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--accent-color);
            font-size: 0.9rem;
        }

        tr:hover {
            background-color: var(--surface-hover);
        }

        .badge {
            padding: 0.2rem 0.5rem;
            font-size: 0.8rem;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
        }

        .badge.success { border-color: var(--success-color); color: var(--success-color); }
        .badge.error { border-color: var(--error-color); color: var(--error-color); }
        
        .metric-value {
            font-size: 2.5rem;
            color: var(--text-main);
        }
        
        button {
            background-color: var(--bg-color);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 0.5rem 1rem;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
        }
        
        button:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MultiProxy</h1>
            <div style="color: var(--text-muted); font-size: 0.9rem;">
                STATUS: <span class="badge success">ONLINE</span>
            </div>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
