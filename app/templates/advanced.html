{% extends "base.html" %}

{% block title %}Advanced Analytics - MultiProxy{% endblock %}

{% block content %}
<div class="card" style="margin-bottom: 1rem; padding: 1rem; display: flex; align-items: center; justify-content: space-between;">
    <button hx-get="/" hx-target="main" hx-push-url="true">&larr; Back to Dashboard</button>
    <h2 style="color: var(--accent-color);">Advanced Historical Analytics</h2>
    <button hx-get="/advanced/models" hx-target="main" hx-push-url="true">Per-Model Breakdown &rarr;</button>
</div>

<div class="grid-3">
    <div class="card" style="grid-column: 1 / -1;">
        <div class="card-title">Hourly Token Usage (Last 24 Hours)</div>
        <canvas id="hourlyChart" height="100"></canvas>
    </div>
    
    <div class="card" style="grid-column: 1 / -1;">
        <div class="card-title">Daily Token Usage (Last 30 Days)</div>
        <canvas id="dailyChart" height="100"></canvas>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
        <div class="card-title">Monthly Token Usage (Last 12 Months)</div>
        <canvas id="monthlyChart" height="100"></canvas>
    </div>
</div>

<script>
    async function initCharts() {
        const chartOptions = {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    grid: { color: '#333' },
                    ticks: { color: '#888' }
                },
                x: {
                    grid: { color: '#333' },
                    ticks: { color: '#888' }
                }
            },
            plugins: {
                legend: { labels: { color: '#e0e0e0', font: { family: 'monospace' } } }
            }
        };

        async function createChart(elementId, period, label) {
            const response = await fetch(`/api/stats/time-series/${period}`);
            const data = await response.json();
            
            const ctx = document.getElementById(elementId).getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.label),
                    datasets: [
                        {
                            label: 'Total Tokens',
                            data: data.map(d => d.tokens),
                            backgroundColor: 'rgba(0, 255, 204, 0.5)',
                            borderColor: '#00ffcc',
                            borderWidth: 1
                        },
                        {
                            label: 'Cached Tokens',
                            data: data.map(d => d.cached_tokens),
                            backgroundColor: 'rgba(136, 136, 136, 0.5)',
                            borderColor: '#888',
                            borderWidth: 1
                        }
                    ]
                },
                options: chartOptions
            });
        }

        createChart('hourlyChart', 'hour', 'Last 24h');
        createChart('dailyChart', 'day', 'Last 30d');
        createChart('monthlyChart', 'month', 'Last Year');
    }

    // Initialize on load
    initCharts();
    
    // Also re-initialize if HTMX swaps this content in
    document.body.addEventListener('htmx:afterOnLoad', function(evt) {
        if (evt.detail.target.tagName === 'MAIN') {
            initCharts();
        }
    });
</script>
{% endblock %}
